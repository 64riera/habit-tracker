services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      # Reuses your development variables (APP_JWT_SECRET, etc.).
      # If you want remote Turso instead of local SQLite, define
      # TURSO_DATABASE_URL / TURSO_AUTH_TOKEN here, uncommented.
      - .env.local
    environment:
      # Overrides any file:./local.db from .env.local so the database
      # lives in the persistent volume instead of inside the container.
      TURSO_DATABASE_URL: file:/app/data/local.db
    volumes:
      - just-go-data:/app/data
    restart: unless-stopped

volumes:
  just-go-data:
