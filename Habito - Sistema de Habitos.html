document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n      newHabit: '+ New habit', editHabit: 'Edit habit',\n      fieldName: 'Name', fieldCategory: 'Category', fieldGoalType: 'Goal type', fieldGoal: 'Target',\n      fieldFrequency: 'Frequency', fieldReminder: 'Reminder', fieldHardMode: 'Hard mode',\n      save: 'Save changes', archive: 'Archive habit'\n    };\n\n    // Heatmap\n    const heatmap = Array.from({ length: 140 }, (_, i) => {\n      const level = (i * 13 + 5) % 5;\n      const color = level === 0 ? t.border : hexToRgba(t.text, [0.18, 0.38, 0.62, 0.9][level - 1]);\n      return { color };\n    });\n    const heatmapMobile = heatmap.slice(0, 98);\n\n    // Month calendar (real July 2026 geometry)\n    const year = 2026, month = 6, today = 4;\n    const daysInMonth = new Date(year, month + 1, 0).getDate();\n    const startWeekday = new Date(year, month, 1).getDay();\n    const weekdays = lang === 'es' ? ['L', 'M', 'X', 'J', 'V', 'S', 'D'] : ['M', 'T', 'W', 'T', 'F', 'S', 'S'];\n    const startOffset = (startWeekday + 6) % 7; // Monday-first\n    const monthNames = lang === 'es'\n      ? ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre']\n      : ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n    const monthLabel = lang === 'es' ? monthNames[month] + ' ' + year : monthNames[month] + ' ' + year;\n    const cells = [];\n    for (let i = 0; i < startOffset; i++) cells.push({ label: '', bg: 'transparent', border: 'transparent', textColor: t.muted });\n    for (let d = 1; d <= daysInMonth; d++) {\n      if (d > today) { cells.push({ label: String(d), bg: 'transparent', border: t.border, textColor: t.muted }); continue; }\n      if (d === today) { cells.push({ label: String(d), bg: t.accent, border: t.accent, textColor: t.accentContrast }); continue; }\n      const mod = d % 6;\n      if (mod === 0) cells.push({ label: String(d), bg: 'transparent', border: t.border, textColor: t.muted });\n      else if (mod === 3) cells.push({ label: String(d), bg: hexToRgba(t.text, 0.35), border: 'transparent', textColor: t.accentContrast });\n      else cells.push({ label: String(d), bg: t.text, border: t.text, textColor: t.accentContrast });\n    }\n\n    // Log entries\n    const LOG = lang === 'es' ? [\n      { date: '3 jul', habit: 'Inglés', status: 'Parcial', statusColor: t.muted, note: 'Se me hizo tarde, solo alcancé 8 de 15 min.' },\n      { date: '2 jul', habit: 'Ejercicio', status: 'Justificado', statusColor: t.muted, note: 'Viaje de trabajo, sin acceso a gimnasio.' },\n      { date: '1 jul', habit: 'Estudiar', status: 'Hecho', statusColor: t.text, note: 'Mejor sesión de la semana — 24 páginas.' }\n    ] : [\n      { date: 'Jul 3', habit: 'English', status: 'Partial', statusColor: t.muted, note: 'Ran out of time, only reached 8 of 15 min.' },\n      { date: 'Jul 2', habit: 'Exercise', status: 'Excused', statusColor: t.muted, note: 'Work trip, no gym access.' },\n      { date: 'Jul 1', habit: 'Study', status: 'Done', statusColor: t.text, note: 'Best session of the week — 24 pages.' }\n    ];\n\n    // Stats\n    const statsCards = lang === 'es'\n      ? [{ value: 82, label: '7 días' }, { value: 75, label: '30 días' }, { value: 69, label: '90 días' }]\n      : [{ value: 82, label: '7 days' }, { value: 75, label: '30 days' }, { value: 69, label: '90 days' }];\n    const trendVals = [60, 80, 40, 90, 70, 100, 50, 65, 85, 45, 95, 60, 75, 100];\n    const trend = trendVals.map((h, i) => ({ h, bg: i === trendVals.length - 1 ? t.accent : hexToRgba(t.text, 0.22) }));\n    const trendMobile = trendVals.slice(-10).map((h, i, arr) => ({ h, bg: i === arr.length - 1 ? t.accent : hexToRgba(t.text, 0.22) }));\n    const catStatsVals = [88, 64, 91, 77, 50];\n    const catKeys = ['creatividad', 'fitness', 'aprendizaje', 'estudio', 'bienestar'];\n    const categories = catKeys.map((k, i) => ({ label: lang === 'es' ? CATS[k].es : CATS[k].en, color: CATS[k].color, pct: catStatsVals[i] }));\n    const badgeDefs = lang === 'es' ? [\n      { label: '7 días', desc: 'Racha semanal', earned: true },\n      { label: 'Mes perfecto', desc: 'Junio 2026', earned: true },\n      { label: '30 días', desc: 'Aún por lograr', earned: false },\n      { label: '100 días', desc: 'Aún por lograr', earned: false }\n    ] : [\n      { label: '7 days', desc: 'Weekly streak', earned: true },\n      { label: 'Perfect month', desc: 'June 2026', earned: true },\n      { label: '30 days', desc: 'Not yet earned', earned: false },\n      { label: '100 days', desc: 'Not yet earned', earned: false }\n    ];\n    const badges = badgeDefs.map(b => ({\n      label: b.label, desc: b.desc,\n      bg: b.earned ? t.text : 'transparent', color: b.earned ? t.surface : t.muted,\n      border: b.earned ? t.text : t.border\n    }));\n    const badgesMobile = badges.slice(0, 2);\n\n    // Habit management list\n    const mgmt = [...HABITS.map(h => ({ ...h, lifecycle: 'activo' })), MGMT_EXTRA].map(h => {\n      const name = lang === 'es' ? h.nameEs : h.nameEn;\n      return {\n        id: h.id, initial: name.charAt(0).toUpperCase(), name,\n        category: lang === 'es' ? CATS[h.cat].es : CATS[h.cat].en,\n        color: CATS[h.cat].color, colorTint: tint(CATS[h.cat].color, 0.14),\n        freq: lang === 'es' ? h.freqEs : h.freqEn,\n        lifecycleLabel: lang === 'es' ? (h.lifecycle === 'activo' ? 'Activo' : 'Pausado') : (h.lifecycle === 'activo' ? 'Active' : 'Paused'),\n        lifecycleColor: h.lifecycle === 'activo' ? t.text : t.muted\n      };\n    });\n\n    const editSource = HABITS[2];\n    const editHabit = { name: lang === 'es' ? editSource.nameEs : editSource.nameEn, goal: lang === 'es' ? editSource.goalEs : editSource.goalEn, reminder: '8:00 PM' };\n\n    const categoryChips = catKeys.map(k => {\n      const selected = k === editSource.cat;\n      const label = lang === 'es' ? CATS[k].es : CATS[k].en;\n      return { label, bg: selected ? t.text : 'transparent', color: selected ? t.surface : t.muted, border: selected ? t.text : t.border };\n    });\n    const goalTypeDefs = lang === 'es' ? ['Binario', 'Cuantitativo', 'Duración'] : ['Binary', 'Quantitative', 'Duration'];\n    const goalTypeChips = goalTypeDefs.map((label, i) => ({ label, bg: i === 2 ? t.text : 'transparent', color: i === 2 ? t.surface : t.muted }));\n    const dayDefs = lang === 'es' ? ['L', 'M', 'X', 'J', 'V', 'S', 'D'] : ['M', 'T', 'W', 'T', 'F', 'S', 'S'];\n    const selectedDays = [0, 1, 2, 3, 4];\n    const dayChips = dayDefs.map((label, i) => {\n      const on = selectedDays.includes(i);\n      return { label, bg: on ? t.text : 'transparent', color: on ? t.surface : t.muted, border: on ? t.text : t.border };\n    });\n\n    const settings = lang === 'es' ? [\n      { label: 'Tema', value: theme === 'light' ? 'Claro' : 'Oscuro' },\n      { label: 'Idioma', value: 'Español' },\n      { label: 'Hora de corte del día', sub: 'El día \"de hoy\" termina a esta hora', hasSub: true, value: '3:00 AM' },\n      { label: 'Recordatorios', value: 'Activados' },\n      { label: 'Exportar historial', value: 'CSV / JSON' },\n      { label: 'Última sincronización', value: 'Hoy, 09:14' }\n    ] : [\n      { label: 'Theme', value: theme === 'light' ? 'Light' : 'Dark' },\n      { label: 'Language', value: 'English' },\n      { label: 'Day cutoff time', sub: '\"Today\" ends at this hour', hasSub: true, value: '3:00 AM' },\n      { label: 'Reminders', value: 'On' },\n      { label: 'Export history', value: 'CSV / JSON' },\n      { label: 'Last synced', value: 'Today, 09:14' }\n    ];\n\n    const o = {\n      t, nav, habits, pct, labels: L,\n      toggleJustify: theme === 'dark' ? 'flex-end' : 'flex-start',\n      langEsBg: lang === 'es' ? t.accent : 'transparent', langEsColor: lang === 'es' ? t.accentContrast : t.muted,\n      langEnBg: lang === 'en' ? t.accent : 'transparent', langEnColor: lang === 'en' ? t.accentContrast : t.muted,\n      isHoy: screen === 'hoy', isHistorial: screen === 'historial', isEstadisticas: screen === 'estadisticas',\n      isHabitos: screen === 'habitos', isAjustes: screen === 'ajustes',\n      heatmap, heatmapMobile,\n      calendar: { monthLabel, weekdays, cells },\n      log: LOG, logMobile: LOG.slice(0, 2),\n      stats: { cards: statsCards, trend, trendMobile, categories, badges, badgesMobile, streakMax: 27 },\n      mgmt, editHabit, categoryChips, goalTypeChips, dayChips, settings\n    };\n\n    return {\n      o, toggleTheme: () => this.toggleTheme(),\n      langToEs: () => this.setLang('es'), langToEn: () => this.setLang('en')\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
